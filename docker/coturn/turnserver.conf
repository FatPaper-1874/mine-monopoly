listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# TLS 证书（turns: 协议必需，浏览器要求有效证书）
cert=/etc/coturn/certs/fullchain.pem
pkey=/etc/coturn/certs/privkey.pem

# HMAC-SHA1 动态凭证验证（与 Express 的 TURN_SECRET 一致）
use-auth-secret
static-auth-secret=${TURN_SECRET}

realm=fatpaper.site

# 日志
log-file=stdout
verbose

# 性能
fingerprint
no-multicast-peers

# 安全 - 允许所有 peer IP
allowed-peer-ip=0.0.0.0-255.255.255.255

# Prometheus 指标导出
prometheus
prometheus-port=9641
